#
# Headless host with Waydroid Android container support.
# Based on lmp-dynamicdevices-headless but re-enables the minimal graphics/audio
# stack Waydroid needs (wayland, opengl, pulseaudio, alsa).
#

require conf/distro/lmp-dynamicdevices-headless.conf

DISTRO = "lmp-dynamicdevices-headless-waydroid"
DISTROOVERRIDES = "lmp:lmp-dynamicdevices:lmp-dynamicdevices-headless:lmp-dynamicdevices-headless-waydroid"
DISTRO_NAME = "Linux-microPlatform Dynamic Devices Headless Waydroid"

DISTRO_FEATURES:append = " waydroid wayland opengl pulseaudio alsa"
