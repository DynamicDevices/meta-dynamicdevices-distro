# meta-dynamicdevices-distro — shared distro / factory image policy
# See conf/lmp-feature-dev.inc for optional dev image extras (e.g. phytool on DT510)

BBFILE_COLLECTIONS += "meta-dynamicdevices-distro"
BBFILE_PATTERN_meta-dynamicdevices-distro := "^${LAYERDIR}/recipes-"
BBFILE_PRIORITY_meta-dynamicdevices-distro = "11"
LAYERVERSION_meta-dynamicdevices-distro = "1"
LAYER_CONF_VERSION ?= "7"
LAYERDESCRIPTION_meta-dynamicdevices-distro = "Dynamic Devices distro: shared LmP image and distro includes"
LAYERMAINTAINER_meta-dynamicdevices-distro = "Dynamic Devices <info@dynamicdevices.co.uk>"

BBPATH .= ":${LAYERDIR}"
BBFILES += " \
  ${LAYERDIR}/recipes*/*/*.bb \
  ${LAYERDIR}/recipes*/*/*.bbappend \
"
LAYERDEPENDS_meta-dynamicdevices-distro = "meta-lmp-base"
LAYERSERIES_COMPAT_meta-dynamicdevices-distro = "scarthgap kirkstone"
