# Dynamic Devices — LE Audio / Auracast (BAP broadcast) host roles
# Aligns with NXP UM12155 (Bluetooth LE Audio user manual): PipeWire + WirePlumber + BlueZ.
# Broadcast roles: bap_bcast_source / bap_bcast_sink (Auracast-style public audio).
# If WirePlumber rejects unknown role tokens, drop bap_bcast_* until BlueZ/WirePlumber match NXP drop.

wireplumber.profiles = {
  main = {
    monitor.bluez.properties = {
      bluez5.hfphsp-backend = "native"
      bluez5.roles = [
        a2dp_sink
        a2dp_source
        bap_sink
        bap_source
        bap_bcast_sink
        bap_bcast_source
        hfp_hf
        hfp_ag
      ]
      bluez5.codecs = [ sbc sbc_xq lc3 ]
    }
  }
}
